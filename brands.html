<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Marques — Samsung, iPhone, Tecno, Infinix, Itel, Huawei | TogoCase</title>
<meta name="description" content="Accessoires classés par marque : Samsung, Apple, Tecno, Infinix, Itel, Huawei. Trouvez votre modèle en 2 clics.">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="header-top">
      <a href="pages.html" class="back-btn" aria-label="Retour" onclick="return goBackSmart(event,'pages.html')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <a href="pages.html" class="logo"><span class="dot">●</span>TogoCase</a>
      <div class="header-icons">
        <a class="icon-btn" href="components.html#favoris" aria-label="Favoris">♡<span class="count" data-fav-count style="display:none">0</span></a>
        <a class="icon-btn" href="components.html#panier" aria-label="Panier">🛒<span class="count" data-cart-count style="display:none">0</span></a>
      </div>
    </div>
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      <input type="search" placeholder="Chercher un modèle" data-search>
    </div>
    <div style="position:relative">
      <div data-search-results style="display:none;position:absolute;top:-6px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;padding:6px 10px;z-index:30;box-shadow:var(--shadow-pop);max-height:min(60vh,320px);overflow-y:auto;-webkit-overflow-scrolling:touch;"></div>
    </div>
    <div class="breadcrumb"><a href="pages.html">Accueil</a> / <span>Marques</span></div>
  </div>
</header>

<main class="container">
  <section class="section" id="liste-marques">
    <h1 style="font-size:22px;">Toutes les marques</h1>
    <p style="font-size:13px;color:var(--ink-60);margin:6px 0 16px;">Sélectionnez une marque pour voir les modèles disponibles et leurs accessoires compatibles.</p>
    <div id="brand-tiles" style="display:flex;flex-direction:column;gap:14px;"></div>
  </section>
</main>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom">© 2026 TogoCase — Lomé, Togo.</div>
  </div>
</footer>

<a href="https://wa.me/22879901555?text=Bonjour%2C%20j%27ai%20une%20question%20sur%20une%20marque" class="whatsapp-float" aria-label="Contacter sur WhatsApp">💬</a>

<nav class="bottom-nav">
  <a href="pages.html">🏠<span>Accueil</span></a>
  <a href="brands.html" class="active">🏷️<span>Marques</span></a>
  <a href="pages.html#populaires">🔍<span>Modèles</span></a>
  <a href="components.html#panier">🛒<span>Panier</span></a>
  <a href="components.html#contact">☎️<span>Contact</span></a>
</nav>

<script src="assets/app.js"></script>
<script>
function renderBrandTiles(){
  const params = new URLSearchParams(location.search);
  const focusId = params.get("id");
  const list = focusId ? BRANDS.filter(b=>b.id===focusId) : BRANDS;

  // BRAND_LOGOS vient désormais uniquement de assets/app.js (source unique,
  // voir le commentaire à côté de brandCardHTML) — plus de copie locale ici.

  document.getElementById("brand-tiles").innerHTML = list.map(b=>{
    const models = MODELS.filter(m=>m.brand===b.id);
    // BUG corrigé lors de l'audit : si une marque n'a aucun modèle (ex:
    // tous supprimés via l'API), [...models].sort(...)[0] valait undefined
    // et bestModel.id plantait TOUT le rendu de la liste (pas seulement
    // celui de cette marque, puisque le .map() entier échouait) — la page
    // se retrouvait alors entièrement vide. On protège maintenant ce cas.
    const bestModel = models.length ? [...models].sort((a,b2)=>b2.pop-a.pop)[0] : null;
    const accessoryTypes = CATEGORIES.slice(0,4).map(c=>c.name).join(" · ");
    return `
    <article class="brand-tile" id="${b.id}">
      <div class="brand-tile-top">
        <div class="logo-mark" style="width:52px;height:52px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;">
          <img src="${BRAND_LOGOS[b.id]}" alt="${b.name}" style="width:100%;height:100%;object-fit:contain;display:block;" 
               onerror="this.style.display='none'; this.parentElement.innerHTML = '<span style=\'font-size:28px;font-weight:700;color:var(--ink)\'>${b.name[0]}</span>';">
        </div>
        <div>
          <h2 style="font-size:17px;margin-bottom:2px;">${b.name}</h2>
          <span class="eyebrow">${b.tag}</span>
        </div>
      </div>
      <p class="desc">Accessoires vérifiés pour tous les modèles ${b.name} vendus au Togo : ${accessoryTypes} et plus.</p>
      <div class="model-pill-row">
        ${models.length ? models.map(m=>`<a class="model-pill" href="models.html?id=${m.id}">${m.name}${m.best?' 🔥':''}</a>`).join("") : '<span style="font-size:12px;color:var(--ink-60);">Aucun modèle disponible pour le moment.</span>'}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${bestModel ? `<a class="btn btn-primary btn-sm" href="models.html?id=${bestModel.id}">Voir le plus demandé</a>` : ''}
        <a class="btn btn-outline btn-sm" href="https://wa.me/22879901555?text=${encodeURIComponent('Bonjour, je cherche un accessoire pour '+b.name)}">💬 Demander conseil</a>
      </div>
    </article>`;
  }).join("");

  if(focusId){
    const focusBrand = BRANDS.find(b=>b.id===focusId);
    document.querySelector(".breadcrumb").innerHTML = focusBrand
      ? `<a href="pages.html">Accueil</a> / <a href="brands.html">Marques</a> / <span>${escAttr(focusBrand.name)}</span>`
      : `<a href="pages.html">Accueil</a> / <span>Marques</span>`;
  }
}
// BRANDS/MODELS viennent maintenant du backend : on attend TogoCaseReady
// avant le premier rendu. La fonction renderBrandTiles() elle-même est
// INCHANGÉE — seul le moment de son premier appel a été différé.
TogoCaseReady.then(renderBrandTiles);
</script>
</body>
</html>
