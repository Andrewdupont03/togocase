<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title id="page-title">Accessoires compatibles | TogoCase</title>
<meta name="description" id="page-desc" content="Coques, vitres, chargeurs, câbles, écouteurs, powerbanks et supports compatibles avec votre téléphone.">
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="has-sticky-buybar">

<header class="site-header">
  <div class="container">
    <div class="header-top">
      <a href="brands.html" class="back-btn" aria-label="Retour" onclick="return goBackSmart(event,'brands.html')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </a>
      <a href="pages.html" class="logo"><span class="dot">●</span>TogoCase</a>
      <div class="header-icons">
        <a class="icon-btn" href="components.html#favoris" aria-label="Favoris">♡<span class="count" data-fav-count style="display:none">0</span></a>
        <a class="icon-btn" href="components.html#panier" aria-label="Panier">🛒<span class="count" data-cart-count style="display:none">0</span></a>
      </div>
    </div>
    <div class="breadcrumb" id="breadcrumb"><a href="pages.html">Accueil</a> / <a href="brands.html">Marques</a> / <span>Modèle</span></div>
  </div>
</header>

<main class="container">

  <!-- FICHE MODELE -->
  <section class="section" style="padding-top:16px;">
    <div style="display:flex;gap:16px;align-items:center;background:var(--white);border:1px solid var(--line);border-radius:var(--radius-l);padding:16px;box-shadow:var(--shadow-card);">
      <div style="width:76px;height:76px;background:var(--cream-2);border-radius:16px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;overflow:hidden;">
        <img id="brand-logo" src="" alt="" style="width:100%;height:100%;object-fit:contain;display:block;">
      </div>
      <div style="flex:1;">
        <h1 id="model-name" style="font-size:19px;"></h1>
        <div class="eyebrow" id="model-brand"></div>
        <div class="popularity" style="margin-top:8px;"><i id="pop-bar"></i></div>
        <div class="eyebrow" id="pop-text"></div>
      </div>
    </div>
  </section>

  <!-- FILTRES CATEGORIE -->
  <section class="section" style="padding-top:0;">
    <div class="filter-bar" id="cat-filters"></div>
  </section>

  <!-- BEST SELLERS DU MODELE -->
  <section class="section" style="padding-top:0;">
    <div class="section-head"><h2>Best-sellers pour ce modèle</h2></div>
    <div class="hscroll" id="model-best"></div>
  </section>

  <!-- GRILLE ACCESSOIRES -->
  <section class="section" style="padding-top:0;" id="produits">
    <div class="section-head"><h2>Tous les accessoires compatibles</h2></div>
    <div class="grid-2" id="accessory-grid"></div>
  </section>

</main>

<div class="sticky-buy-bar">
  <div class="p">
    <div class="eyebrow">À partir de</div>
    <div class="price" style="font-size:16px;" id="min-price">—</div>
  </div>
  <div class="actions">
    <a class="btn btn-outline btn-block" id="wa-model-link" href="#">💬 WhatsApp</a>
    <a class="btn btn-primary btn-block" href="components.html#panier">Voir le panier</a>
  </div>
</div>

<nav class="bottom-nav">
  <a href="pages.html">🏠<span>Accueil</span></a>
  <a href="brands.html">🏷️<span>Marques</span></a>
  <a href="brands.html" class="active">🔍<span>Modèles</span></a>
  <a href="components.html#panier">🛒<span>Panier</span></a>
  <a href="components.html#contact">☎️<span>Contact</span></a>
</nav>

<script src="assets/app.js"></script>
<script>
const params = new URLSearchParams(location.search);
// Déclarées ici (portée module) pour que renderFilters()/renderGrid()
// puissent les lire par closure ; elles sont réellement remplies dans
// TogoCaseReady.then() ci-dessous, une fois le catalogue chargé.
let modelId, model, brand, accessories;
let activeCat = "tous";

function renderFilters(){
  const all = [{id:"tous",name:"Tous",icon:"🔎"}, ...CATEGORIES];
  document.getElementById("cat-filters").innerHTML = all.map(c=>`
    <button class="filter-btn ${activeCat===c.id?'chip is-active':''}" data-cat="${c.id}">${c.icon} ${c.name}</button>
  `).join("");
  document.querySelectorAll("[data-cat]").forEach(btn=>{
    btn.addEventListener("click", ()=>{ activeCat = btn.dataset.cat; renderFilters(); renderGrid(); });
  });
}
function renderGrid(){
  const list = activeCat==="tous" ? accessories : accessories.filter(a=>a.cat===activeCat);
  document.getElementById("accessory-grid").innerHTML = list.map(productCardHTML).join("");
}

// BRANDS/MODELS/accessoriesFor viennent maintenant du backend : tout ce qui
// suit est IDENTIQUE au script d'avant, seulement déplacé derrière l'attente
// du catalogue.
TogoCaseReady.then(() => {
  modelId = params.get("id") || MODELS[0].id;
  model = MODELS.find(m=>m.id===modelId) || MODELS[0];
  brand = BRANDS.find(b=>b.id===model.brand);
  accessories = accessoriesFor(model.id);

  document.getElementById("page-title").textContent = `Accessoires ${model.name} — coques, chargeurs, écouteurs | TogoCase`;
  document.getElementById("page-desc").setAttribute("content", `Tous les accessoires compatibles ${model.name} : coques, vitres, chargeurs, câbles, écouteurs, powerbanks, supports. Livraison rapide au Togo.`);
  document.getElementById("breadcrumb").innerHTML = `<a href="pages.html">Accueil</a> / <a href="brands.html?id=${brand.id}">${brand.name}</a> / <span>${model.name}</span>`;
  document.getElementById("model-name").textContent = model.name;
  document.getElementById("model-brand").textContent = brand.name;

  // Logo de la marque réelle du modèle consulté (au lieu d'un logo Samsung figé)
  // BRAND_LOGOS vient désormais uniquement de assets/app.js (source unique,
  // voir le commentaire à côté de brandCardHTML) — plus de copie locale ici.
  const brandLogoEl = document.getElementById("brand-logo");
  brandLogoEl.src = BRAND_LOGOS[brand.id] || "assets/images/placeholder-phone.svg";
  brandLogoEl.alt = brand.name;
  brandLogoEl.onerror = function(){
    this.onerror = null;
    this.style.display = "none";
    this.parentElement.innerHTML = `<span style="font-size:26px;font-weight:700;color:var(--forest);font-family:var(--font-display);">${escAttr(brand.name[0])}</span>`;
  };
  document.getElementById("pop-bar").style.width = model.pop + "%";
  document.getElementById("pop-text").textContent = model.pop + "% des clients " + brand.name + " choisissent ce modèle";
  // BUG corrigé lors de l'audit : si `accessories` est vide (modèle sans
  // aucun produit, ex: tous supprimés via l'API), Math.min(...[]) vaut
  // Infinity et affichait "∞ F" comme prix de départ. On protège ce cas.
  document.getElementById("min-price").textContent = accessories.length
    ? money(Math.min(...accessories.map(a=>a.price)))
    : "—";
  document.getElementById("wa-model-link").href = waLink(`Bonjour, je cherche des accessoires pour ${model.name}`);

  document.getElementById("model-best").innerHTML =
    [...accessories].sort((a,b)=>b.reviews-a.reviews).slice(0,5).map(productCardHTML).join("");

  renderFilters();
  renderGrid();
});
</script>
</body>
</html>
